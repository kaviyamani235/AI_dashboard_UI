<!DOCTYPE html>
<html>

<head>

<title>AI Login</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="login-box">

<h1>🤖 AI Dashboard</h1>


<input id="email" type="email" placeholder="Email">


<input id="password" type="password" placeholder="Password">


<button id="loginBtn">
Login
</button>


<button id="signupBtn">
Create Account
</button>


</div>



<script type="module">


import { initializeApp } from 
"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";


import { 
getAuth, 
signInWithEmailAndPassword,
createUserWithEmailAndPassword
} 
from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";




// PASTE YOUR FIREBASE CONFIG HERE

const firebaseConfig = {
  apiKey: "AIzaSyBDTXCSVPJzIOuBDf9d5oQz0PQuQVJMGa8",
  authDomain: "ai-dashboard-d8561.firebaseapp.com",
  projectId: "ai-dashboard-d8561",
  storageBucket: "ai-dashboard-d8561.firebasestorage.app",
  messagingSenderId: "101053027901",
  appId: "1:101053027901:web:7e414694ecff9a4785bc54",
  measurementId: "G-WL2QRFGTXH"
};



const app = initializeApp(firebaseConfig);


const auth = getAuth(app);




// Login

document.getElementById("loginBtn").onclick = function(){


let email = document.getElementById("email").value;

let password = document.getElementById("password").value;



signInWithEmailAndPassword(auth,email,password)

.then(()=>{


window.location="index.html";


})


.catch((error)=>{


alert(error.message);


});


};





// Create Account


document.getElementById("signupBtn").onclick=function(){


let email=document.getElementById("email").value;

let password=document.getElementById("password").value;



createUserWithEmailAndPassword(auth,email,password)

.then(()=>{


alert("Account created successfully");


})


.catch(error=>{


alert(error.message);


});


};



</script>


</body>

</html>
